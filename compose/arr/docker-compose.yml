services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /Users/peteedoo/homelab-data/arr/qbittorrent:/config
      - /Volumes/homelab/media:/data
    networks:
      - default

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    platform: linux/arm64
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 1.0.0.1
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    ports:
      - "127.0.0.1:9696:9696"
    volumes:
      - /Users/peteedoo/homelab-data/arr/prowlarr:/config
    networks:
      - default

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    ports:
      - "127.0.0.1:8989:8989"
    volumes:
      - /Users/peteedoo/homelab-data/arr/sonarr:/config
      - /Volumes/homelab/media:/data
    networks:
      - default

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - /Users/peteedoo/homelab-data/arr/radarr:/config
      - /Volumes/homelab/media:/data
    networks:
      - default

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - LOG_LEVEL=info
    ports:
      - "127.0.0.1:5055:5055"
    volumes:
      - /Users/peteedoo/homelab-data/arr/jellyseerr:/app/config
    networks:
      - default
      - proxy

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    platform: linux/arm64
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    ports:
      - "127.0.0.1:8686:8686"
    volumes:
      - /Users/peteedoo/homelab-data/arr/lidarr:/config
      - /Volumes/homelab/media:/data:delegated
      - /Volumes/homelab/media/downloads/soulseek:/slskd_downloads:delegated
    networks:
      - default

  mylar3:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /Users/peteedoo/homelab-data/arr/mylar3:/config
      - /Volumes/homelab/media:/data
    networks:
      - default

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    platform: linux/arm64
    restart: unless-stopped
    network_mode: host
    environment:
      - SLSKD_SLSK_USERNAME=${SLSK_USER}
      - SLSKD_SLSK_PASSWORD=${SLSK_PASS}
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_DOWNLOADS_DIR=/downloads/complete
      - SLSKD_INCOMPLETE_DIR=/downloads/incomplete
      - SLSKD_SHARED_DIR=/music
      - TZ=America/Chicago
    volumes:
      - /Users/peteedoo/homelab-data/arr/slskd:/app/config
      - slskd-downloads:/downloads
      - slskd-music:/music

  soularr:
    image: mrusse08/soularr:latest
    container_name: soularr
    platform: linux/arm64
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=America/Chicago
    volumes:
      - /Users/peteedoo/homelab-data/arr/soularr:/data
      - /Volumes/homelab/media/downloads/soulseek:/downloads

  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - /Volumes/homelab/media/youtube:/downloads
    networks:
      - default

networks:
  proxy:
    external: true

volumes:
  slskd-downloads:
    external: true
  slskd-music:
    external: true
