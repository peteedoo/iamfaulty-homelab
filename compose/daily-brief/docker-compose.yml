services:
  daily-brief:
    build: .
    container_name: daily-brief
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:5000"
    volumes:
      - /Users/peteedoo/homelab-data/daily-brief:/data
    environment:
      - BRIEF_TOKEN=${BRIEF_TOKEN}
    networks:
      - proxy

networks:
  proxy:
    external: true
