services:
  sync-server:
    build: ./sync-server
    container_name: sync-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:13001:3001"
    volumes:
      - sync-data:/app/data
    environment:
      - SYNC_TOKEN=${SYNC_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agent-stack

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - agent-stack
    depends_on:
      - sync-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  sync-data:
  caddy-data:
  caddy-config:

networks:
  agent-stack:
    driver: bridge
