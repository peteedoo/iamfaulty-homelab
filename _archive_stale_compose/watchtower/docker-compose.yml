services:
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    platform: linux/arm64
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
